---
name: CI

permissions: {}

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - "**.md"
  schedule:
    - cron: '0 4 1 * *'
  # Run workflow manually
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dev packages
        run: sudo apt-get update && sudo apt-get install -y build-essential automake autoconf libtool

      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@v3

      - name: Build vendored libucl
        run: |
          mise libucl:build
          mise libucl:install

      - name: Run tests
        run: mise dev:spec
